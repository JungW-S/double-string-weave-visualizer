<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Layered Richardson Weave</title>
    <link rel="stylesheet" href="./style.css?v=20260709-layered-richardson">
  </head>
  <body>
    <main class="app-shell">
      <header class="page-header">
        <div>
          <p class="eyebrow">open Richardson weave</p>
          <h1>Layered Richardson weave</h1>
          <p class="subtitle">
            Visualize the right-inductive layered convention using <span class="formula">v<sup>c</sup>=w<sub>0</sub>v<sup>-1</sup></span>,
            <span class="formula">v<sup>c</sup>β(w)=(j<sub>1</sub>,...,j<sub>ℓ</sub>)</span>, and
            <span class="formula">s<sub>w,v</sub>=(j<sub>1</sub>R,...,j<sub>ℓ</sub>R)</span>.
          </p>
          <nav class="page-nav" aria-label="Visualizer pages">
            <a class="page-nav-link" href="./double-string-weave.html">Double string</a>
            <a class="page-nav-link" href="./open-richardson.html">Ménard's seed</a>
            <a class="page-nav-link active" href="./richardson-layered.html">Layered Richardson</a>
          </nav>
        </div>
      </header>

      <section class="workspace layered-workspace reverse-richardson-workspace">
        <form id="input-form" class="input-panel">
          <div class="panel-header">
            <h2>Input</h2>
          </div>

          <section class="input-subpanel manual-input-panel">
            <div class="input-subpanel-header">
              <h3>Type A data</h3>
            </div>

            <label class="field">
              <span>Rank n in Aₙ</span>
              <input id="rank-input" name="rank" type="number" min="1" step="1" inputmode="numeric" value="4">
            </label>

            <label class="field">
              <span>Reduced word β(w)</span>
              <textarea id="w-input" name="w" rows="2" spellcheck="false">1 2 3 4 2 3 1 2</textarea>
            </label>

            <label class="field">
              <span>Reduced word for v</span>
              <textarea id="v-input" name="v" rows="2" spellcheck="false">2 3</textarea>
            </label>

            <label class="field">
              <span>Optional β(vᶜ) for final layer</span>
              <textarea id="vc-input" name="vc" rows="2" spellcheck="false" placeholder="computed from w₀v⁻¹"></textarea>
            </label>

            <label class="field layered-slider-field">
              <span>Layer a</span>
              <input id="layer-input" name="layer" type="range" min="0" max="8" step="1" value="8">
              <output id="layer-output" class="layer-output">a=8</output>
            </label>

            <div class="layer-step-actions" aria-label="Layer navigation">
              <button type="button" id="layer-prev-button" class="secondary-button">Prev layer</button>
              <button type="button" id="layer-next-button" class="secondary-button">Next layer</button>
            </div>

            <div class="chain-box-move-actions">
              <button type="button" id="photo-example-button" class="secondary-button">A4 example</button>
              <button type="button" id="small-example-button" class="secondary-button">A2 example</button>
            </div>
          </section>

          <button type="submit" class="primary-button">Build layered weave</button>
          <p class="input-note">
            The sequence <span class="formula">v<sub>≥k</sub></span> uses the board definition:
            <span class="formula">s<sub>i_k</sub>v<sub>≥k</sub></span>.
          </p>
          <div id="error-box" class="error-box" hidden></div>
        </form>

        <section id="output" class="output-panel" aria-live="polite"></section>
      </section>
    </main>

    <script type="module" src="./src/richardson-layered.mjs?v=20260710-layered-photo-tau"></script>
  </body>
</html>
